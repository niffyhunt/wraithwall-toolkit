name: Publish to PyPI

# Push toolkit to GitHub first, then:
# 1. First release per package: run ./publish.sh testpypi locally, or upload once with API token
# 2. On each PyPI project → Publishing → Add trusted publisher:
#      Owner: niffyhunt
#      Repository: wraithwall-toolkit
#      Workflow: publish.yml
# 3. Tag a release: git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [canary-kit, honeypot-mitre, dml-spec]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: |
          pip install --upgrade pip
          pip install .
          pip install pytest
          python -m pytest tests/ -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [canary-kit, honeypot-mitre, dml-spec]
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: |
          pip install build
          python -m build

      - name: Publish ${{ matrix.package }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package }}/dist/
          print-hash: true