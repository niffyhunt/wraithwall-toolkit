name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [canary-kit, honeypot-mitre, dml-spec]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest
          python -m pytest tests/ -q

      - name: Verify wheel builds
        working-directory: ${{ matrix.package }}
        run: |
          pip install build
          python -m build
          ls -la dist/