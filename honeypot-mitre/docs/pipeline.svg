<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace">
  <defs>
    <!-- arrowheads -->
    <marker id="ahRed" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#E5484D"/>
    </marker>
    <marker id="ahGrey" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#5C5C57"/>
    </marker>
    <marker id="ahGreen" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#3DD68C"/>
    </marker>
    <linearGradient id="recGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101a16"/>
      <stop offset="1" stop-color="#0c130f"/>
    </linearGradient>
    <radialGradient id="dedupGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#3DD68C" stop-opacity="0.30"/>
      <stop offset="0.6" stop-color="#3DD68C" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#3DD68C" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0 L0 0 0 34" fill="none" stroke="#ffffff" stroke-opacity="0.022" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- canvas -->
  <rect width="1440" height="980" fill="#0A0A0B"/>
  <rect width="1440" height="980" fill="url(#grid)"/>

  <!-- ============ TITLE BAR ============ -->
  <g>
    <circle cx="40" cy="44" r="6" fill="#3DD68C"/>
    <circle cx="40" cy="44" r="11" fill="none" stroke="#3DD68C" stroke-opacity="0.4"/>
    <text x="62" y="40" fill="#F4F4F2" font-size="20" letter-spacing="1.5" font-weight="600">WRAITHWALL · HONEYPOT → MITRE</text>
    <text x="62" y="62" fill="#8A8A84" font-size="13" letter-spacing="0.5">One raw Cowrie SSH session → structured ATT&amp;CK mapping · deterministic score · order-independent replay-dedup key</text>
    <text x="1400" y="36" text-anchor="end" fill="#5C5C57" font-size="12" letter-spacing="0.5">pure stdlib · no DB · no Redis · no LLM required</text>
    <text x="1400" y="58" text-anchor="end" fill="#5C5C57" font-size="12" letter-spacing="0.5">score = base + cmds·2 + techniques·3  (cap 100)</text>
  </g>
  <line x1="40" y1="84" x2="1400" y2="84" stroke="#23262B" stroke-width="1"/>

  <!-- zone headers -->
  <text x="40"   y="118" fill="#5C5C57" font-size="12" letter-spacing="2">01 · INGEST — COWRIE LOG → SESSION</text>
  <text x="470"  y="118" fill="#5C5C57" font-size="12" letter-spacing="2">02 · DETERMINISTIC ANALYSIS — analyze_session()</text>
  <text x="1095" y="118" fill="#5C5C57" font-size="12" letter-spacing="2">03 · INTELLIGENCE RECORD</text>

  <!-- ============ ZONE 1 : INGEST ============ -->
  <!-- raw cowrie json -->
  <g>
    <rect x="40" y="150" width="370" height="208" rx="8" fill="#101214" stroke="#23262B"/>
    <rect x="40" y="150" width="370" height="30" rx="8" fill="#16191D"/>
    <rect x="40" y="168" width="370" height="12" fill="#16191D"/>
    <circle cx="60" cy="165" r="4" fill="#5C5C57"/>
    <text x="74" y="170" fill="#C7C7C2" font-size="12.5" letter-spacing="1">cowrie.json · raw event stream</text>
    <text x="394" y="170" text-anchor="end" fill="#5C5C57" font-size="11">honeypot-1</text>
    <g font-size="10.5" fill="#8A8A84">
      <text x="60" y="202">{"eventid":"<tspan fill="#4C8DFF">session.connect</tspan>","src_ip":"203.0.113.10"}</text>
      <text x="60" y="222">{"eventid":"<tspan fill="#F5A524">login.success</tspan>","user":"root","pw":"123456"}</text>
      <text x="60" y="242">{"eventid":"command.input","input":"<tspan fill="#C7C7C2">uname -a</tspan>"}</text>
      <text x="60" y="262">{"eventid":"command.input","input":"<tspan fill="#C7C7C2">whoami</tspan>"}</text>
      <text x="60" y="282">{"eventid":"command.input","input":"<tspan fill="#C7C7C2">cat /etc/shadow</tspan>"}</text>
      <text x="60" y="302">{"eventid":"command.input","input":"<tspan fill="#C7C7C2">wget hxxp://…/x.sh -O /tmp/x.sh</tspan>"}</text>
      <text x="60" y="322">{"eventid":"<tspan fill="#5C5C57">session.closed</tspan>","duration":42.7}</text>
    </g>
    <text x="60" y="346" fill="#5C5C57" font-size="10.5">7 JSON events · interleaved across many sessions</text>
  </g>

  <!-- parse arrow -->
  <path d="M225,358 L225,398" fill="none" stroke="#5C5C57" stroke-width="1.6" marker-end="url(#ahGrey)"/>
  <text x="237" y="382" fill="#8A8A84" font-size="11">parse_sessions()</text>

  <!-- parsed session -->
  <g>
    <rect x="40" y="404" width="370" height="200" rx="8" fill="#101214" stroke="#23262B"/>
    <rect x="40" y="404" width="370" height="30" rx="8" fill="#16191D"/>
    <rect x="40" y="422" width="370" height="12" fill="#16191D"/>
    <circle cx="60" cy="419" r="4" fill="#4C8DFF"/>
    <text x="74" y="424" fill="#C7C7C2" font-size="12.5" letter-spacing="1">Session  a1b2c3d4</text>
    <text x="394" y="424" text-anchor="end" fill="#5C5C57" font-size="11">10:00:02Z</text>

    <text x="60" y="458" fill="#8A8A84" font-size="12">src_ip</text>
    <text x="394" y="458" text-anchor="end" fill="#F4F4F2" font-size="13" font-weight="600">203.0.113.10</text>
    <text x="60" y="480" fill="#8A8A84" font-size="12">login</text>
    <text x="394" y="480" text-anchor="end" fill="#C7C7C2" font-size="12">root : 123456  ✓</text>
    <text x="60" y="502" fill="#8A8A84" font-size="12">duration</text>
    <text x="394" y="502" text-anchor="end" fill="#C7C7C2" font-size="12">42.7 s</text>
    <line x1="60" y1="516" x2="390" y2="516" stroke="#23262B" stroke-dasharray="3 4"/>
    <text x="60" y="538" fill="#8A8A84" font-size="12">commands (4)</text>
    <g font-size="11" fill="#C7C7C2">
      <text x="60" y="558">1 · uname -a</text>
      <text x="60" y="576">2 · whoami</text>
      <text x="222" y="558">3 · cat /etc/shadow</text>
      <text x="222" y="576">4 · wget …/x.sh</text>
    </g>
    <text x="60" y="596" fill="#5C5C57" font-size="10.5">Session dataclass · one row per SSH/Telnet session</text>
  </g>

  <!-- session -> engine -->
  <path d="M410,504 C448,504 448,360 470,360" fill="none" stroke="#5C5C57" stroke-width="1.6" marker-end="url(#ahGrey)"/>

  <!-- ============ ZONE 2 : ANALYSIS ENGINE ============ -->
  <rect x="470" y="150" width="560" height="700" rx="10" fill="#0E0F11" stroke="#23262B"/>
  <text x="492" y="180" fill="#C7C7C2" font-size="13" letter-spacing="1">analyze_session(session)  ·  deterministic core</text>
  <text x="1008" y="180" text-anchor="end" fill="#5C5C57" font-size="11">stdlib only · same input → same output</text>
  <line x1="492" y1="194" x2="1008" y2="194" stroke="#23262B"/>

  <!-- ① map_techniques -->
  <g>
    <rect x="492" y="210" width="516" height="150" rx="7" fill="#101214" stroke="#23262B"/>
    <rect x="492" y="210" width="4" height="150" rx="2" fill="#4C8DFF"/>
    <text x="512" y="234" fill="#4C8DFF" font-size="12.5" letter-spacing="1">① map_techniques — ATT&amp;CK SUBSTRING TABLE</text>
    <text x="512" y="258" fill="#8A8A84" font-size="11">4 lines lower-cased → first matching stage wins  →  dominant = <tspan fill="#4C8DFF">reconnaissance (TA0043)</tspan></text>
    <text x="512" y="278" fill="#5C5C57" font-size="10.5">crude by design: <tspan fill="#8A8A84">cat /etc/shadow</tspan> folds into recon, not credential_access (substring, not ML)</text>
    <!-- technique chips -->
    <g font-size="10.5">
      <rect x="512" y="292" width="76" height="22" rx="4" fill="#16191D" stroke="#2a3340"/><text x="550" y="307" text-anchor="middle" fill="#C7C7C2">T1082</text>
      <rect x="594" y="292" width="76" height="22" rx="4" fill="#16191D" stroke="#2a3340"/><text x="632" y="307" text-anchor="middle" fill="#C7C7C2">T1033</text>
      <rect x="676" y="292" width="76" height="22" rx="4" fill="#16191D" stroke="#2a3340"/><text x="714" y="307" text-anchor="middle" fill="#C7C7C2">T1016</text>
      <rect x="758" y="292" width="76" height="22" rx="4" fill="#16191D" stroke="#2a3340"/><text x="796" y="307" text-anchor="middle" fill="#C7C7C2">T1057</text>
      <rect x="840" y="292" width="76" height="22" rx="4" fill="#16191D" stroke="#2a3340"/><text x="878" y="307" text-anchor="middle" fill="#C7C7C2">T1595</text>
      <rect x="922" y="292" width="76" height="22" rx="4" fill="#16191D" stroke="#2a3340"/><text x="960" y="307" text-anchor="middle" fill="#C7C7C2">T1592</text>
    </g>
    <text x="512" y="336" fill="#8A8A84" font-size="10.5">Sys Info · Owner/User · Net Config · Process · Active Scanning · Host Recon</text>
    <text x="996" y="336" text-anchor="end" fill="#5C5C57" font-size="11">conf 0.85</text>
  </g>

  <!-- ② score_session -->
  <g>
    <rect x="492" y="376" width="516" height="108" rx="7" fill="#101214" stroke="#23262B"/>
    <rect x="492" y="376" width="4" height="108" rx="2" fill="#F5A524"/>
    <text x="512" y="400" fill="#F5A524" font-size="12.5" letter-spacing="1">② score_session — DETERMINISTIC FORMULA</text>
    <text x="996" y="400" text-anchor="end" fill="#5C5C57" font-size="11">capped at 100</text>
    <g font-size="11.5">
      <text x="512" y="426" fill="#8A8A84">base_for_stage[recon]</text>      <text x="700" y="426" text-anchor="end" fill="#C7C7C2">5</text>
      <text x="730" y="426" fill="#8A8A84">commands  4 × 2</text>            <text x="996" y="426" text-anchor="end" fill="#C7C7C2">+ 8</text>
      <text x="512" y="446" fill="#8A8A84">distinct_techniques  6 × 3</text> <text x="700" y="446" text-anchor="end" fill="#C7C7C2">+ 18</text>
      <text x="730" y="446" fill="#5C5C57">heuristic triage signal — not a verdict</text>
    </g>
    <line x1="512" y1="458" x2="996" y2="458" stroke="#23262B"/>
    <text x="512" y="478" fill="#F4F4F2" font-size="14" font-weight="700">score = 31</text>
    <text x="996" y="478" text-anchor="end" fill="#F5A524" font-size="12">5 + 8 + 18  ·  ≤ 100</text>
  </g>

  <!-- ③ classify_actor -->
  <g>
    <rect x="492" y="500" width="516" height="108" rx="7" fill="#101214" stroke="#23262B"/>
    <rect x="492" y="500" width="4" height="108" rx="2" fill="#F5A524"/>
    <text x="512" y="524" fill="#F5A524" font-size="12.5" letter-spacing="1">③ classify_actor — VOLUME GUESS + 2 OVERRIDES</text>
    <text x="996" y="524" text-anchor="end" fill="#5C5C57" font-size="11">label only</text>
    <g font-size="11.5">
      <text x="512" y="550" fill="#8A8A84">4 cmds ≤ 5  → guess</text>          <text x="996" y="550" text-anchor="end" fill="#C7C7C2">automated_scanner</text>
      <text x="512" y="570" fill="#8A8A84">mdrfckr + authorized_keys ?</text>  <text x="996" y="570" text-anchor="end" fill="#5C5C57">no → not outlaw_worm</text>
      <text x="512" y="590" fill="#8A8A84">ran ≥1 cmd &amp; closed &lt; 15 s ?</text>   <text x="996" y="590" text-anchor="end" fill="#5C5C57">no (42.7 s) → no demotion</text>
    </g>
  </g>

  <!-- ④ dedup_key -->
  <g>
    <rect x="492" y="624" width="516" height="150" rx="7" fill="#0c130f" stroke="#1f3a2c"/>
    <rect x="492" y="624" width="4" height="150" rx="2" fill="#3DD68C"/>
    <text x="512" y="648" fill="#3DD68C" font-size="12.5" letter-spacing="1">④ dedup_key — ORDER-INDEPENDENT SIGNATURE</text>
    <text x="996" y="648" text-anchor="end" fill="#3DD68C" font-size="12">exact · sha256</text>
    <text x="512" y="672" fill="#C7C7C2" font-size="11">sha256( "\n".join( <tspan fill="#3DD68C">sorted</tspan>(commands) ) )[:16]</text>
    <text x="512" y="694" fill="#8A8A84" font-size="10.5">sorting kills sequence order → the same payload in any order collapses to one key</text>
    <rect x="512" y="704" width="484" height="28" rx="6" fill="#101a16" stroke="#3DD68C" stroke-opacity="0.5"/>
    <text x="528" y="723" fill="#8A8A84" font-size="11.5">dedup_key</text>
    <text x="980" y="723" text-anchor="end" fill="#3DD68C" font-size="13" font-weight="700" letter-spacing="2">905830e685fbbb20</text>
    <text x="512" y="754" fill="#5C5C57" font-size="10.5">InMemoryDedupStore · 15-min TTL window → first hit alerts, identical replays suppressed</text>
  </g>

  <!-- engine -> record connector -->
  <path d="M1030,440 C1056,440 1056,300 1080,280" fill="none" stroke="#3DD68C" stroke-width="2" marker-end="url(#ahGreen)"/>

  <!-- ============ ZONE 3 : INTELLIGENCE RECORD ============ -->
  <circle cx="1240" cy="600" r="118" fill="url(#dedupGlow)" filter="url(#soft)"/>
  <rect x="1080" y="150" width="320" height="720" rx="10" fill="url(#recGrad)" stroke="#1f3a2c"/>
  <text x="1100" y="180" fill="#C7C7C2" font-size="13" letter-spacing="1">analyze_session() → dict</text>
  <line x1="1100" y1="194" x2="1380" y2="194" stroke="#1f3a2c"/>

  <!-- record fields -->
  <g font-size="12">
    <text x="1100" y="224" fill="#8A8A84">session_id</text>      <text x="1380" y="224" text-anchor="end" fill="#F4F4F2">a1b2c3d4</text>
    <text x="1100" y="250" fill="#8A8A84">src_ip</text>          <text x="1380" y="250" text-anchor="end" fill="#F4F4F2">203.0.113.10</text>
    <text x="1100" y="276" fill="#8A8A84">dominant_stage</text>  <text x="1380" y="276" text-anchor="end" fill="#4C8DFF">reconnaissance</text>
    <text x="1100" y="302" fill="#8A8A84">progression</text>     <text x="1380" y="302" text-anchor="end" fill="#C7C7C2">[reconnaissance]</text>
    <text x="1100" y="328" fill="#8A8A84">techniques</text>      <text x="1380" y="328" text-anchor="end" fill="#C7C7C2">6 · T1082…T1592</text>
    <text x="1100" y="354" fill="#8A8A84">confidence</text>      <text x="1380" y="354" text-anchor="end" fill="#C7C7C2">0.85</text>
    <text x="1100" y="380" fill="#8A8A84">actor_label</text>     <text x="1380" y="380" text-anchor="end" fill="#C7C7C2">automated_scanner</text>
    <text x="1100" y="406" fill="#8A8A84">campaign_indicators</text><text x="1380" y="406" text-anchor="end" fill="#5C5C57">[ ]</text>
    <text x="1100" y="432" fill="#8A8A84">dedup_key</text>       <text x="1380" y="432" text-anchor="end" fill="#3DD68C">905830e685fbbb20</text>
  </g>

  <!-- score badge -->
  <rect x="1100" y="452" width="280" height="34" rx="6" fill="#101214" stroke="#F5A524" stroke-opacity="0.55"/>
  <text x="1116" y="474" fill="#8A8A84" font-size="12">score</text>
  <text x="1364" y="474" text-anchor="end" fill="#F5A524" font-size="14" font-weight="700">31 / 100</text>

  <line x1="1100" y1="510" x2="1380" y2="510" stroke="#1f3a2c" stroke-dasharray="3 4"/>
  <text x="1100" y="538" fill="#5C5C57" font-size="11" letter-spacing="1">REPLAY COLLAPSE</text>

  <!-- dedup collapse visual -->
  <g>
    <circle cx="1130" cy="600" r="12" fill="#101214" stroke="#5C5C57" stroke-width="1.4"/>
    <text x="1130" y="604" text-anchor="middle" fill="#8A8A84" font-size="9">IP</text>
    <circle cx="1130" cy="640" r="12" fill="#101214" stroke="#5C5C57" stroke-width="1.4"/>
    <text x="1130" y="644" text-anchor="middle" fill="#8A8A84" font-size="9">IP</text>
    <circle cx="1130" cy="680" r="12" fill="#101214" stroke="#5C5C57" stroke-width="1.4"/>
    <text x="1130" y="684" text-anchor="middle" fill="#8A8A84" font-size="9">IP</text>
    <text x="1130" y="716" text-anchor="middle" fill="#5C5C57" font-size="10">…×N</text>

    <path d="M1146,602 C1200,606 1210,628 1248,640" fill="none" stroke="#3DD68C" stroke-opacity="0.6" stroke-width="1.4"/>
    <path d="M1146,640 L1248,640" fill="none" stroke="#3DD68C" stroke-opacity="0.6" stroke-width="1.4"/>
    <path d="M1146,678 C1200,674 1210,652 1248,640" fill="none" stroke="#3DD68C" stroke-opacity="0.6" stroke-width="1.4"/>

    <circle cx="1278" cy="640" r="34" fill="#101a16" stroke="#3DD68C" stroke-width="2"/>
    <text x="1278" y="636" text-anchor="middle" fill="#3DD68C" font-size="10" letter-spacing="1">1 ALERT</text>
    <text x="1278" y="652" text-anchor="middle" fill="#F4F4F2" font-size="11" font-weight="700">9058…b20</text>
  </g>
  <text x="1100" y="752" fill="#5C5C57" font-size="10.5">same payload from a botnet's worth of</text>
  <text x="1100" y="768" fill="#5C5C57" font-size="10.5">IPs → one incident, not N pages</text>

  <!-- triage badge -->
  <rect x="1100" y="788" width="280" height="34" rx="6" fill="#101a16" stroke="#3DD68C"/>
  <text x="1116" y="810" fill="#8A8A84" font-size="12">triage</text>
  <text x="1364" y="810" text-anchor="end" fill="#3DD68C" font-size="13" font-weight="700" letter-spacing="1">RECON · LOW-MED</text>
  <text x="1100" y="844" fill="#5C5C57" font-size="10.5">optional [llm] enrichment never touches the</text>
  <text x="1100" y="860" fill="#5C5C57" font-size="10.5">deterministic score or actor label</text>

  <!-- ============ LEGEND / FOOTER ============ -->
  <line x1="40" y1="892" x2="1400" y2="892" stroke="#23262B"/>
  <g font-size="11.5">
    <circle cx="48" cy="918" r="4" fill="#4C8DFF"/>      <text x="60" y="922" fill="#8A8A84">ATT&amp;CK mapping (substring table)</text>
    <circle cx="330" cy="918" r="4" fill="#F5A524"/>     <text x="342" y="922" fill="#8A8A84">heuristic — score / coarse actor label</text>
    <circle cx="660" cy="918" r="4" fill="#3DD68C"/>     <text x="672" y="922" fill="#8A8A84">deterministic exact — sha256 dedup key</text>
    <text x="1400" y="922" text-anchor="end" fill="#5C5C57">illustrative values from examples/sample_cowrie.json · honeypot-mitre (MIT) · WraithWall</text>
  </g>
</svg>
