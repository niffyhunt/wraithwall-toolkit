<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1426"/>
      <stop offset="0.55" stop-color="#0A0A0B"/>
      <stop offset="1" stop-color="#111318"/>
    </linearGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1A3A5C" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#2A6A9C" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1A3A5C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C41A1A"/>
      <stop offset="1" stop-color="#E23A2E"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#C44B4B" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#C44B4B" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto">
      <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#8A8A84"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#grid)"/>
  <rect x="0" y="0" width="1440" height="3" fill="url(#hot)"/>

  <!-- earth horizon -->
  <ellipse cx="720" cy="930" rx="980" ry="210" fill="none" stroke="url(#horizon)" stroke-width="2"/>
  <ellipse cx="720" cy="930" rx="980" ry="210" fill="#0E1A2E" fill-opacity="0.25"/>

  <!-- telemetry arcs -->
  <path d="M1180,120 Q900,260 520,340" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.2"/>
  <path d="M260,120 Q540,260 920,340" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.2"/>
  <circle cx="520" cy="340" r="16" fill="url(#pulse)"/>
  <circle cx="920" cy="340" r="16" fill="url(#pulse)"/>
  <circle cx="720" cy="300" r="10" fill="url(#pulse)"/>

  <!-- satellite -->
  <g transform="translate(1210,88)" opacity="0.9">
    <rect x="-18" y="-6" width="36" height="12" rx="2" fill="#1E2430" stroke="#5C5C57"/>
    <rect x="-34" y="-10" width="12" height="20" rx="1" fill="#2A3140" stroke="#5C5C57"/>
    <rect x="22" y="-10" width="12" height="20" rx="1" fill="#2A3140" stroke="#5C5C57"/>
    <circle cx="0" cy="0" r="3" fill="#C41A1A"/>
  </g>

  <!-- title -->
  <text x="72" y="78" fill="#F4F4F2" font-size="34" font-weight="700" letter-spacing="2">WRAITHWALL OSS</text>
  <text x="72" y="112" fill="#B8C0CC" font-size="15" letter-spacing="1.5">Open-source deception engineering</text>
  <text x="72" y="142" fill="#5C5C57" font-size="12" letter-spacing="0.5">v0.1.0 · MIT · built from live honeypot + canary telemetry</text>

  <!-- live source strip -->
  <g>
    <rect x="72" y="168" width="1296" height="56" rx="8" fill="#10141C" stroke="#23262B"/>
    <circle cx="96" cy="196" r="5" fill="#C41A1A"/>
    <circle cx="96" cy="196" r="9" fill="none" stroke="#C41A1A" stroke-opacity="0.35"/>
    <text x="118" y="192" fill="#C7C7C2" font-size="12.5" letter-spacing="0.8">PRODUCTION SIGNALS</text>
    <text x="118" y="212" fill="#8A8A84" font-size="11">Cowrie sessions · canary beacons · campaign clusters · BGP / ASN context</text>
    <text x="1320" y="200" text-anchor="end" fill="#5C5C57" font-size="11">extracted · decoupled · tested</text>
  </g>

  <!-- repo: toolkit -->
  <g>
    <rect x="72" y="260" width="620" height="520" rx="10" fill="#0E1014" stroke="#C41A1A" stroke-opacity="0.45"/>
    <rect x="72" y="260" width="620" height="38" rx="10" fill="#16191D"/>
    <rect x="72" y="286" width="620" height="12" fill="#16191D"/>
    <text x="96" y="286" fill="#F4F4F2" font-size="14" font-weight="600" letter-spacing="1">wraithwall-toolkit</text>
    <text x="672" y="286" text-anchor="end" fill="#5C5C57" font-size="11">pip install today</text>

    <text x="96" y="330" fill="#8A8A84" font-size="11">github.com/niffyhunt/wraithwall-toolkit</text>

    <!-- packages -->
    <g font-size="11.5">
      <rect x="96" y="352" width="572" height="72" rx="6" fill="#12161C" stroke="#23262B"/>
      <rect x="96" y="352" width="4" height="72" fill="#C41A1A"/>
      <text x="116" y="378" fill="#F4F4F2" font-weight="600">canary-kit</text>
      <text x="116" y="400" fill="#8A8A84">mint · plant · detect supply-chain canary tokens</text>

      <rect x="96" y="436" width="572" height="72" rx="6" fill="#12161C" stroke="#23262B"/>
      <rect x="96" y="436" width="4" height="72" fill="#C41A1A"/>
      <text x="116" y="462" fill="#F4F4F2" font-weight="600">honeypot-mitre</text>
      <text x="116" y="484" fill="#8A8A84">Cowrie logs → MITRE ATT&amp;CK · score · dedup</text>

      <rect x="96" y="520" width="572" height="72" rx="6" fill="#12161C" stroke="#23262B"/>
      <rect x="96" y="520" width="4" height="72" fill="#C41A1A"/>
      <text x="116" y="546" fill="#F4F4F2" font-weight="600">dml-spec</text>
      <text x="116" y="568" fill="#8A8A84">signed deception markup · validate · verify</text>
    </g>

    <line x1="96" y1="612" x2="668" y2="612" stroke="#23262B"/>
    <text x="96" y="638" fill="#5C5C57" font-size="10.5" letter-spacing="1">RELEASE PIPELINE</text>
    <text x="96" y="662" fill="#8A8A84" font-size="11">CI on push · PyPI publish on tag</text>
    <text x="96" y="686" fill="#8A8A84" font-size="11">incidents/ · SECURITY · CONTRIBUTING</text>
    <text x="96" y="718" fill="#5C5C57" font-size="10">no Flask · no database · no secrets</text>
  </g>

  <!-- repo: platform -->
  <g>
    <rect x="748" y="260" width="620" height="520" rx="10" fill="#0E1014" stroke="#4C8DFF" stroke-opacity="0.35"/>
    <rect x="748" y="260" width="620" height="38" rx="10" fill="#16191D"/>
    <rect x="748" y="286" width="620" height="12" fill="#16191D"/>
    <text x="772" y="286" fill="#F4F4F2" font-size="14" font-weight="600" letter-spacing="1">wraithwall</text>
    <text x="1348" y="286" text-anchor="end" fill="#5C5C57" font-size="11">platform snapshot</text>

    <text x="772" y="330" fill="#8A8A84" font-size="11">github.com/niffyhunt/wraithwall</text>

    <g font-size="11.5">
      <rect x="772" y="352" width="572" height="88" rx="6" fill="#12161C" stroke="#23262B"/>
      <rect x="772" y="352" width="4" height="88" fill="#4C8DFF"/>
      <text x="792" y="378" fill="#F4F4F2" font-weight="600">platform core</text>
      <text x="792" y="400" fill="#8A8A84">gateway · link intel · cowrie intel · BGP monitor</text>
      <text x="792" y="420" fill="#8A8A84">canary service · campaign correlation · deception engines</text>

      <rect x="772" y="452" width="572" height="72" rx="6" fill="#12161C" stroke="#23262B"/>
      <rect x="772" y="452" width="4" height="72" fill="#3DD68C"/>
      <text x="792" y="478" fill="#F4F4F2" font-weight="600">ravenscan (raven)</text>
      <text x="792" y="500" fill="#8A8A84">engineering intelligence · drift · security delta · reports</text>

      <rect x="772" y="536" width="572" height="56" rx="6" fill="#12161C" stroke="#23262B"/>
      <text x="792" y="562" fill="#8A8A84">packages/ — same toolkit libs vendored for monorepo deploy</text>
      <text x="792" y="582" fill="#5C5C57" font-size="10.5">docker compose · .env.example · pytest</text>
    </g>

    <line x1="772" y1="612" x2="1344" y2="612" stroke="#23262B"/>
    <text x="772" y="638" fill="#5C5C57" font-size="10.5" letter-spacing="1">DOCS &amp; SITE</text>
    <text x="772" y="662" fill="#8A8A84" font-size="11">wraithwall.online/docs · /launch · incident reports</text>
    <text x="772" y="686" fill="#8A8A84" font-size="11">blog · knowledge base · architecture pages</text>
    <text x="772" y="718" fill="#5C5C57" font-size="10">production monolith not fully mirrored — OSS cut only</text>
  </g>

  <!-- connector -->
  <path d="M692,420 L748,420" fill="none" stroke="#8A8A84" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="720" y="408" text-anchor="middle" fill="#5C5C57" font-size="10">shared DNA</text>

  <!-- footer -->
  <text x="72" y="848" fill="#5C5C57" font-size="11">MIT · deception engineering for builders, defenders, researchers</text>
  <text x="1368" y="848" text-anchor="end" fill="#5C5C57" font-size="11">wraithwall.online</text>
</svg>