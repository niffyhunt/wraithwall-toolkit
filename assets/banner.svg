<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="448" viewBox="0 0 1280 448">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E0E0D"/>
      <stop offset="1" stop-color="#161513"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C41A1A"/>
      <stop offset="1" stop-color="#E23A2E"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="448" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="112" x2="1280" y2="112"/>
    <line x1="0" y1="224" x2="1280" y2="224"/>
    <line x1="0" y1="336" x2="1280" y2="336"/>
  </g>

  <!-- top hairline -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#hot)"/>

  <!-- brand mark -->
  <g transform="translate(80,72)">
    <rect width="56" height="56" rx="8" fill="url(#hot)"/>
    <text x="28" y="39" font-family="'IBM Plex Mono','Courier New',monospace" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle">W</text>
  </g>
  <text x="156" y="112" font-family="'IBM Plex Mono','Courier New',monospace" font-size="30" font-weight="700" letter-spacing="3" fill="#FFFFFF">WRAITHWALL</text>
  <text x="156" y="138" font-family="'IBM Plex Mono','Courier New',monospace" font-size="14" letter-spacing="4" fill="#8A8780">OPEN&#8211;SOURCE TOOLKIT</text>

  <!-- headline -->
  <text x="80" y="218" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="800" fill="#FFFFFF">Deception tools, lifted from a</text>
  <text x="80" y="270" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="800" fill="#FFFFFF">platform that takes <tspan fill="#E23A2E">live traffic.</tspan></text>

  <!-- three tool cards -->
  <g font-family="'IBM Plex Mono','Courier New',monospace">
    <g transform="translate(80,318)">
      <rect width="356" height="84" rx="6" fill="#FFFFFF" fill-opacity="0.04" stroke="#C41A1A" stroke-opacity="0.35"/>
      <rect x="0" y="0" width="3" height="84" fill="#C41A1A"/>
      <text x="22" y="34" font-size="18" font-weight="700" fill="#FFFFFF">Canary Kit</text>
      <text x="22" y="60" font-size="12.5" fill="#9B9890">Supply-chain canary tokens</text>
    </g>
    <g transform="translate(462,318)">
      <rect width="356" height="84" rx="6" fill="#FFFFFF" fill-opacity="0.04" stroke="#C41A1A" stroke-opacity="0.35"/>
      <rect x="0" y="0" width="3" height="84" fill="#C41A1A"/>
      <text x="22" y="34" font-size="18" font-weight="700" fill="#FFFFFF">Honeypot &#8594; MITRE</text>
      <text x="22" y="60" font-size="12.5" fill="#9B9890">Logs &#8594; ATT&amp;CK + score + dedup</text>
    </g>
    <g transform="translate(844,318)">
      <rect width="356" height="84" rx="6" fill="#FFFFFF" fill-opacity="0.04" stroke="#C41A1A" stroke-opacity="0.35"/>
      <rect x="0" y="0" width="3" height="84" fill="#C41A1A"/>
      <text x="22" y="34" font-size="18" font-weight="700" fill="#FFFFFF">DML</text>
      <text x="22" y="60" font-size="12.5" fill="#9B9890">Signed, versioned trap config</text>
    </g>
  </g>

  <text x="1200" y="138" font-family="'IBM Plex Mono','Courier New',monospace" font-size="13" letter-spacing="2" fill="#6B6860" text-anchor="end">MIT &#183; by niffy_hunt</text>
</svg>
